{% extends "base.html" %}
{% block title %}Change Password | EduVault{% endblock %}
{% block public_content %}
<section class="auth-section">
  <div class="auth-card">
    <h1>Change Password</h1>
    <p class="auth-helper">Enter the 6-digit code sent to {{ email }} and choose a new password.</p>
    <form method="post" class="stacked-form">
      {{ csrf_field() }}
      <input type="hidden" name="email" value="{{ email }}">
      <label>Verification Code</label>
      <div class="input-icon otp-input">
        <i class="bi bi-shield-check"></i>
        <input type="text" name="otp" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" placeholder="000000" required>
      </div>
      <label>New Password</label>
      <div class="input-icon">
        <i class="bi bi-lock"></i>
        <input type="password" name="password" minlength="8" placeholder="At least 8 characters" required>
      </div>
      <label>Confirm New Password</label>
      <div class="input-icon">
        <i class="bi bi-lock-fill"></i>
        <input type="password" name="confirm_password" minlength="8" placeholder="Confirm your new password" required>
      </div>
      <button class="btn btn-blue w-100" type="submit">Change Password</button>
    </form>
    <form method="post" action="{{ url_for('resend_password_reset_code') }}" class="mt-3 text-center">
      {{ csrf_field() }}
      <input type="hidden" name="email" value="{{ email }}">
      <button class="small-link link-button" type="submit">Send a new code</button>
    </form>
  </div>
</section>
{% endblock %}
