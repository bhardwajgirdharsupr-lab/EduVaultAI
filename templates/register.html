{% extends "base.html" %}
{% block title %}Create Account | EduVault{% endblock %}
{% block public_content %}
<section class="auth-section">
  <div class="auth-card auth-card-wide">
    <h1>Create Your EduVault Account</h1>
    <form method="post" class="register-grid">
      {{ csrf_field() }}
      <div>
        <label>Full Name</label>
        <div class="input-icon">
          <i class="bi bi-person"></i>
          <input type="text" name="full_name" placeholder="Enter your full name..." required>
        </div>
      </div>
      <div>
        <label>Phone Number</label>
        <div class="input-icon">
          <i class="bi bi-telephone"></i>
          <input type="tel" name="phone" placeholder="Enter your phone number...">
        </div>
      </div>
      <div>
        <label>Email</label>
        <div class="input-icon">
          <i class="bi bi-envelope"></i>
          <input type="email" name="email" placeholder="Enter your email..." required>
        </div>
      </div>
      <div>
        <label>Date of Birth</label>
        <div class="input-icon">
          <i class="bi bi-calendar"></i>
          <input type="date" name="date_of_birth">
        </div>
      </div>
      <div>
        <label>Educational Institution</label>
        <div class="input-icon">
          <i class="bi bi-building"></i>
          <input type="text" name="institution" placeholder="Enter school or university name...">
        </div>
      </div>
      <div>
        <label>Password</label>
        <div class="input-icon">
          <i class="bi bi-lock"></i>
          <input type="password" name="password" placeholder="Create a password..." required>
        </div>
      </div>
      <div>
        <label>Confirm Password</label>
        <div class="input-icon">
          <i class="bi bi-lock-fill"></i>
          <input type="password" name="confirm_password" placeholder="Confirm your password..." required>
        </div>
      </div>
      <div class="register-actions">
        <button class="btn btn-blue w-100" type="submit">Sign Up</button>
        <div class="divider"><span>or sign up with</span></div>
        <div class="oauth-row">
          <a class="oauth-button" href="{{ url_for('google_login') }}" title="{{ 'Sign up with Google' if oauth_enabled else 'Google OAuth needs credentials' }}"><i class="bi bi-google"></i></a>
          <button class="oauth-button" type="button" disabled><i class="bi bi-linkedin"></i></button>
          <button class="oauth-button" type="button" disabled><i class="bi bi-github"></i></button>
        </div>
        <p class="text-center mb-0 mt-3">Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
      </div>
    </form>
  </div>
</section>
{% endblock %}
