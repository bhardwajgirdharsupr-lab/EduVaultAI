{% extends "base.html" %}
{% block title %}Feedback | EduVault{% endblock %}
{% block public_content %}
<section class="auth-section">
  <div class="auth-card auth-card-wide feedback-card">
    <div>
      <p class="eyebrow">Feedback</p>
      <h1>Tell Us What EduVault Should Improve</h1>
      <p class="lead">Your message will be emailed to the EduVault team.</p>
    </div>
    <form method="post" class="feedback-form">
      {{ csrf_field() }}
      <div class="register-grid">
        <div>
          <label>Name</label>
          <div class="input-icon">
            <i class="bi bi-person"></i>
            <input type="text" name="name" value="{{ current_user.full_name if current_user else '' }}" placeholder="Your name" required>
          </div>
        </div>
        <div>
          <label>Email</label>
          <div class="input-icon">
            <i class="bi bi-envelope"></i>
            <input type="email" name="email" value="{{ current_user.email if current_user else '' }}" placeholder="you@example.com" required>
          </div>
        </div>
      </div>
      <div>
        <label>Category</label>
        <div class="input-icon">
          <i class="bi bi-chat-square-text"></i>
          <select name="category" required>
            <option>General feedback</option>
            <option>Bug report</option>
            <option>Feature request</option>
            <option>Account help</option>
            <option>Connector issue</option>
          </select>
        </div>
      </div>
      <div>
        <label>Message</label>
        <div class="input-icon textarea-field">
          <i class="bi bi-pencil-square"></i>
          <textarea name="message" rows="7" placeholder="Share the issue, idea, or feedback..." required></textarea>
        </div>
      </div>
      <button class="btn btn-blue" type="submit">Send Feedback</button>
    </form>
  </div>
</section>
{% endblock %}
