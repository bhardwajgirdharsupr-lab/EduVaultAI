{% extends "base.html" %}
{% block title %}Forgot Password | EduVault{% endblock %}
{% block public_content %}
<section class="auth-section">
  <div class="auth-card">
    <h1>Reset Your Password</h1>
    <p class="auth-helper">Enter your account email and we will send a 6-digit verification code.</p>
    <form method="post" class="stacked-form">
      {{ csrf_field() }}
      <label>Email</label>
      <div class="input-icon">
        <i class="bi bi-envelope"></i>
        <input type="email" name="email" value="{{ email }}" placeholder="you@example.com" required>
      </div>
      <button class="btn btn-blue w-100" type="submit">Send Verification Code</button>
    </form>
    <p class="text-center mb-0 mt-4">Remembered it? <a href="{{ url_for('login') }}">Sign In</a></p>
  </div>
</section>
{% endblock %}
